 <div class="container ">
      <br>
      <br>
      <h2 class="text-center">Mis Obras Favoritas</h2>
      <hr>
      <div #miGrilla class="row row-cols-1 row-cols-md-3 g-4">
        @for (obra of favService.favoritos(); track obra.id) {
          <div class="col">
            <app-artwork-card [artwork]="obra"></app-artwork-card>
          </div>
        } @empty {
          <p>No tienes obras favoritas aún.</p>
        }
      </div>
  </div>
