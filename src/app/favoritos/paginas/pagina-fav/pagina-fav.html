 <div class="container mt-4">
      <h2>Mis Obras Favoritas</h2>
      <hr>
      
      <div class="row row-cols-1 row-cols-md-3 g-4">
        @for (obra of favService.favoritos(); track obra.id) {
          <div class="col">
            <app-artwork-card [artwork]="obra"></app-artwork-card>
          </div>
        } @empty {
          <p>No tienes obras favoritas aún. ¡Explora la galería!</p>
        }
      </div>
    </div>
