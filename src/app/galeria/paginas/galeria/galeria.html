<app-carousel [artworks]="featuredArtworks"></app-carousel>

<hr>
<div class="container">
<div class="row row-cols-1 row-cols-md-3 g-4">
  @for (item of artworks(); track item.id) {
    <div class="col">
      <app-artwork-card [artwork]="item"></app-artwork-card>
    </div>
  }
</div>

@if (isLoading()) {
  <div class="text-center my-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando más arte...</span>
    </div>
  </div>
}
</div>
