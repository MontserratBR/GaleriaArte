<div class="card">
  <img class="card-img-top" [src]="artwork.edmPreview?.[0]" [alt]="artwork.title?.[0]">
  <div class="card-body">
  
    <h5 class="card-title">{{ artwork.title?.[0] || 'Sin título' }}</h5>
    <button (click)="toggleFav()" class="btn btn-link p-0 text-danger fs-4">
      <i class="corazon-click" [class]="esFav() ? 'bi bi-heart-fill' : 'bi bi-heart'"></i>
    </button>
   
    @if (artwork.dcDescription && artwork.dcDescription.length > 0) {
      <p class="card-text descripcion-corta flex-grow-1">
        {{ artwork.dcDescription[0] }}
      </p>
      <div class="mb-3">
        <button (click)="verMasInfo()" class="btn btn-outline-primary btn-sm">
          Más info
        </button>
      </div>
    } @else {
      <p class="no-description card-text flex-grow-1" >No hay descripción disponible para esta obra.</p>
    }

    <p class="author mb-0 mt-auto">
      <strong>Autor:</strong> 
      {{ artwork.dcCreator ? artwork.dcCreator[0] : 'Desconocido' }}
    </p>

  </div>
  </div>
